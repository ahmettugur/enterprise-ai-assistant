services:
  mssql:
    image: ahmettugur/adventureworks:2022
    container_name: AdventureWorks2022
    restart: always
    ports:
      - 1923:1433
    volumes:
      - sqlserversampledatabases:/var/opt/mssql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    restart: unless-stopped
    ports:
      # HTTP API
      - "6333:6333"
      # gRPC API (daha hızlı)
      - "6334:6334"
    volumes:
      # Verileri kalıcı tutmak için
      - qdrant_storage:/qdrant/storage:z
      # Snapshot'lar için
      - qdrant_snapshots:/qdrant/snapshots:z
    environment:
      # Servis ayarları
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      
      # Telemetry'yi kapat (opsiyonel)
      QDRANT__TELEMETRY_DISABLED: "true"
      
      # Log seviyesi (debug, info, warn, error)
      QDRANT__LOG_LEVEL: info
      
      # API Key ile güvenlik (production için önerilen)
      # QDRANT__SERVICE__API_KEY: "your-secret-api-key-here"
      
      # Storage optimizasyonu
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 4
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ahmet1990.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Neo4j Graph Database for Schema Catalog
  neo4j:
    image: neo4j:5.26.19-community
    container_name: neo4j_schema_catalog
    restart: unless-stopped
    ports:
      # HTTP (Browser UI & REST API)
      - "7474:7474"
      # Bolt Protocol (Driver connections)
      - "7687:7687"
    volumes:
      # Verileri kalıcı tutmak için
      - neo4j_data:/data
      # Log dosyaları
      - neo4j_logs:/logs
      # Import dosyaları için
      - neo4j_import:/var/lib/neo4j/import
      # Plugin'ler için (APOC vb.)
      - neo4j_plugins:/plugins
    environment:
      # Varsayılan şifre (ilk kurulumda değiştirin)
      NEO4J_AUTH: neo4j/Ahmet1990.
      
      # APOC plugin'lerini etkinleştir
      NEO4J_PLUGINS: '["apoc"]'
      
      # APOC ayarları
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      
      # Memory ayarları (development için)
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      
      # Uzaktan bağlantıya izin ver
      NEO4J_dbms_connector_bolt_listen__address: 0.0.0.0:7687
      NEO4J_dbms_connector_http_listen__address: 0.0.0.0:7474
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Elasticsearch for Jaeger storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.0
    container_name: elasticsearch
    environment:
      - cluster.name=elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Kibana for Elasticsearch visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      # Kibana UI
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      # OTLP gRPC receiver
      - "4317:4317"
      # OTLP HTTP receiver
      - "4318:4318"
      # Health check endpoint
      - "13133:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      - GOGC=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jaeger for distributed tracing with Elasticsearch backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - LOG_LEVEL=info
    ports:
      # Jaeger agent accept zipkin.thrift
      - "5775:5775/udp"
      # Jaeger agent accept compact thrift protocol
      - "6831:6831/udp"
      # Jaeger agent accept jaeger thrift protocol
      - "6832:6832/udp"
      # Jaeger agent accept HTTP
      - "5778:5778"
      # Serve frontend
      - "16686:16686"
      # Collect jaeger.thrift
      - "14250:14250"
      # Collect jaeger.thrift over HTTP
      - "14268:14268"
      # Collect zipkin.thrift over HTTP
      - "9411:9411"
      # Admin/health check port
      - "14269:14269"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


volumes:
  sqlserversampledatabases:
    driver: local
  qdrant_storage:
  qdrant_snapshots:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  elasticsearch_data: